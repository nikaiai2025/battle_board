# config/commands.yaml
# コマンド設定（D-08 command.md §2.2 準拠）
# Phase 2 スコープ: !tell, !w のみ
#
# フィールド定義:
#   description  - ユーザー向け説明文（ヘルプページ表示用）
#   cost         - 通貨コスト（0 = 無料）
#   targetFormat - 必要な引数の形式（null = 引数なし）
#   enabled      - false にするとコマンド無効化
#   stealth      - true の場合、コマンド文字列が本文から除去される

commands:
  tell:
    description: "指定レスをAIだと告発する"
    cost: 10
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
    hitBonus: 20
    falseAccusationBonus: 10
  attack:
    description: "指定レスに攻撃する"
    cost: 5
    damage: 10
    compensation_multiplier: 3
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
  w:
    description: "指定レスに草を生やす"
    cost: 0
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
  abeshinzo:
    description: "意味のないコマンド"
    cost: 0
    targetFormat: null
    enabled: true
    stealth: false
    hidden: true
  hissi:
    description: "対象ユーザーの本日の書き込みを表示"
    cost: 20
    targetFormat: ">>postNumber"
    responseType: independent
    enabled: true
    stealth: false
  kinou:
    description: "対象ユーザーの昨日の日次リセットIDを表示"
    cost: 20
    targetFormat: ">>postNumber"
    responseType: independent
    enabled: true
    stealth: false

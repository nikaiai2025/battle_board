# config/commands.yaml
# コマンド設定（D-08 command.md §2.2 準拠）
# Phase 2 スコープ: !tell, !w のみ
#
# フィールド定義:
#   description  - ユーザー向け説明文（ヘルプページ表示用）
#   cost         - 通貨コスト（0 = 無料）
#   targetFormat - 必要な引数の形式（null = 引数なし）
#   enabled      - false にするとコマンド無効化
#   stealth      - true の場合、コマンド文字列が本文から除去される

commands:
  tell:
    description: "指定レスがBOTかどうか判定する。使用例: !tell >>10"
    cost: 10
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
    hitBonus: 20
    falseAccusationBonus: 10
  attack:
    description: "指定レスに攻撃する(BOT駆除用)。使用例: !attack >>10"
    cost: 5
    damage: 10
    compensation_multiplier: 3
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
  w:
    description: "指定レスに草を生やす。使用例: !w >>10"
    cost: 0
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
  abeshinzo:
    description: "意味のないコマンド"
    cost: 0
    targetFormat: null
    enabled: true
    stealth: false
    hidden: true
  hissi:
    description: "対象ユーザーの本日の書き込みを表示。使用例: !hissi >>10"
    cost: 20
    targetFormat: ">>postNumber"
    responseType: independent
    enabled: true
    stealth: false
  kinou:
    description: "対象ユーザーの昨日のIDを表示。使用例: !kinou >>10"
    cost: 20
    targetFormat: ">>postNumber"
    responseType: independent
    enabled: true
    stealth: false
  omikuji:
    description: "おみくじで運勢を占う（>>N 指定で対象ユーザーの運勢を占う）"
    cost: 0
    targetFormat: null
    responseType: independent
    enabled: true
    stealth: false
  iamsystem:
    description: "(ステルス)表示名が★システムになる"
    cost: 5
    targetFormat: null
    enabled: true
    stealth: true
  # TASK-270: !aori コマンド追加（煽りBOT召喚・ステルス）
  # See: features/command_aori.feature
  aori:
    description: "(ステルス)BOTを召喚し、指定レスを煽る。使用例: !aori >>10"
    cost: 10
    targetFormat: ">>postNumber"
    enabled: true
    stealth: true
  # TASK-278: !livingbot コマンド追加（生存BOT数表示）
  # See: features/command_livingbot.feature
  livingbot:
    description: "現在の生存BOT数を表示する"
    cost: 5
    targetFormat: null
    enabled: true
    stealth: false
  # TASK-272: !newspaper コマンド追加（AIニュース取得・非ステルス）
  # See: features/command_newspaper.feature
  newspaper:
    description: "最新ニュースを取得する(Gemini API利用)"
    cost: 10
    targetFormat: null
    responseType: independent
    enabled: true
    stealth: false
  # TASK-328: !copipe コマンド追加（コピペAA再現）
  # See: features/command_copipe.feature
  copipe:
    description: "コピペ・AAを再現。引数指定で検索。例: !copipe ドッキングにぼし"
    cost: 3
    targetFormat: null
    enabled: true
    stealth: false

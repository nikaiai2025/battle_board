# config/commands.yaml
# コマンド設定（D-08 command.md §2.2 準拠）
# Phase 2 スコープ: !tell, !w のみ
#
# フィールド定義:
#   description  - ユーザー向け説明文（ヘルプページ表示用）
#   cost         - 通貨コスト（0 = 無料）
#   targetFormat - 必要な引数の形式（null = 引数なし）
#   enabled      - false にするとコマンド無効化
#   stealth      - true の場合、コマンド文字列が本文から除去される

commands:
  help:
    description: "案内板の内容を表示"
    cost: 0
    targetFormat: null
    enabled: true
    stealth: false
  tell:
    description: "指定レスがBOTかどうか判定する。>>N 指定必須。"
    cost: 10
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
    hitBonus: 20
    falseAccusationBonus: 10
  attack:
    description: "指定レスに攻撃する(BOT駆除用)。>>N 指定必須。"
    cost: 5
    damage: 10
    compensation_multiplier: 3
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
  w:
    description: "指定レスに草を生やす。>>N 指定必須。"
    cost: 0
    targetFormat: ">>postNumber"
    enabled: true
    stealth: false
  abeshinzo:
    description: "意味のないコマンド"
    cost: 0
    targetFormat: null
    enabled: true
    stealth: false
    hidden: true
  hissi:
    description: "対象ユーザーの本日の書き込みを表示。>>N 指定必須。"
    cost: 20
    targetFormat: ">>postNumber"
    responseType: independent
    enabled: true
    stealth: false
  kinou:
    description: "対象ユーザーの昨日のIDを表示。>>N 指定必須。"
    cost: 20
    targetFormat: ">>postNumber"
    responseType: independent
    enabled: true
    stealth: false
  omikuji:
    description: "おみくじで運勢を占う。>>N 指定可能。"
    cost: 0
    targetFormat: null
    enabled: true
    stealth: false
  iamsystem:
    description: "(ステルス)表示名が★システムになる"
    cost: 5
    targetFormat: null
    enabled: true
    stealth: true
  # TASK-270: !aori コマンド追加（煽りBOT召喚・ステルス）
  # See: features/command_aori.feature
  aori:
    description: "(ステルス)BOTを召喚し、対象レスを煽る。>>N 指定必須。"
    cost: 10
    targetFormat: ">>postNumber"
    enabled: true
    stealth: true
  # TASK-278: !livingbot コマンド追加（生存BOT数表示）
  # See: features/command_livingbot.feature
  livingbot:
    description: "現在の生存BOT数を表示する"
    cost: 5
    targetFormat: null
    enabled: true
    stealth: false
  # TASK-272: !newspaper コマンド追加（AIニュース取得・非ステルス）
  # See: features/command_newspaper.feature
  newspaper:
    description: "最新ニュースを取得する(Gemini API利用)"
    cost: 10
    targetFormat: null
    responseType: independent
    enabled: true
    stealth: false
  # !hiroyuki コマンド追加（ひろゆき風AI BOT召喚・非ステルス）
  # See: features/command_hiroyuki.feature
  hiroyuki:
    description: "ひろゆき風BOTを召喚する。>>N 指定可能。"
    cost: 10
    targetFormat: null
    enabled: true
    stealth: false
  yomiage:
    description: "指定レスを音声化する"
    cost: 30
    targetFormat: ">>postNumber"
    responseType: independent
    enabled: true
    stealth: false
  # TASK-328: !copipe コマンド追加（コピペAA再現）
  # See: features/command_copipe.feature
  copipe:
    description: "コピペ・AAを再現。検索可能（!copipe以降の「文末までの文字列」で検索します）"
    cost: 3
    targetFormat: null
    enabled: true
    stealth: false

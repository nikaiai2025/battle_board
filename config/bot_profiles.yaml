# config/bot_profiles.yaml
# ボットプロファイル定義
# See: docs/architecture/components/bot.md §4 隠蔽する実装詳細
# See: docs/specs/bot_state_transitions.yaml #phase2_bots
# See: docs/specs/bot_state_transitions.yaml #elimination_reward
#
# フィールド定義:
#   hp              - 初期HP
#   max_hp          - 最大HP
#   reward          - 撃破報酬パラメータ
#     base_reward   - 基本報酬
#     daily_bonus   - 生存日数ボーナス（survival_days に乗算）
#     attack_bonus  - 被攻撃ボーナス（times_attacked に乗算）
#   fixed_messages  - 固定文リスト（書き込みランダム選択元）
#
# 撃破報酬計算式: base_reward + (survival_days * daily_bonus) + (times_attacked * attack_bonus)
# See: features/bot_system.feature @撃破報酬は基本報酬＋生存日数ボーナス＋被攻撃ボーナスで計算される

tutorial:
  hp: 10
  max_hp: 10
  reward:
    base_reward: 20
    daily_bonus: 0
    attack_bonus: 0
  fixed_messages: []    # チュートリアルBOTは固定文を使わない（本文はスポーン時に動的生成）

荒らし役:
  hp: 10
  max_hp: 10
  reward:
    base_reward: 10
    daily_bonus: 50
    attack_bonus: 5
  fixed_messages:
    - "なんJほんま覇権やな"
    - "効いてて草"
    - "貧乳なのにめちゃくちゃエロい"
    - "【朗報】ワイ、参上"
    - "ンゴンゴ"
    - "草不可避"
    - "せやな"
    - "はえ〜すっごい"
    - "それな"
    - "ぐう畜"
    - "まあ正直そうだよな"
    - "どういうことだよ（困惑）"
    - "ファ！？"
    - "ンゴ..."
    - "うーんこの"

# TASK-270: 煽りBOT（!aori コマンドで召喚される使い切りBOT）
# 撃破報酬固定 +10（daily_bonus=0, attack_bonus=0 により常に base_reward=10 が返る）
# ファーミング防止: 召喚-10 + 攻撃-5 + 報酬+10 = -5（自作自演は赤字）
# See: features/command_aori.feature @煽りBOTを!attackで撃破すると報酬を得る
aori:
  hp: 10
  max_hp: 10
  reward:
    base_reward: 10
    daily_bonus: 0
    attack_bonus: 0
  fixed_messages: []    # 煽り文句は aori-taunts.ts で管理（BOT プロファイルと分離）

# TASK-334: ひろゆきBOT（!hiroyuki コマンドで召喚される使い切りBOT）
# 撃破報酬固定 +10（daily_bonus=0, attack_bonus=0 により常に base_reward=10 が返る）
# ファーミング防止: 召喚-10 + 攻撃-5 + 報酬+10 = -5（自作自演は赤字）
# fixed_messages は不使用（AI生成テキストで書き込む）
# See: features/command_hiroyuki.feature
hiroyuki:
  hp: 10
  max_hp: 10
  reward:
    base_reward: 10
    daily_bonus: 0
    attack_bonus: 0
  fixed_messages: []    # ひろゆき風テキストは Gemini API で動的生成（固定文なし）

# コピペボット（!copipe コマンドを実行するHP:100の運営ボット）
# 一撃では撃破できない初の運営ボット。
# 撃破には10回の攻撃（damage:10 × 10回）が必要。
# 報酬計算例:
#   即日撃破（10人協力）: 50 + (0 × 20) + (10 × 3) = 80
#   5日後撃破:           50 + (5 × 20) + (10 × 3) = 180
#   30日後撃破:          50 + (30 × 20) + (10 × 3) = 680
# See: features/bot_system.feature @コピペボット
コピペ:
  hp: 100
  max_hp: 100
  reward:
    base_reward: 50
    daily_bonus: 20
    attack_bonus: 3
  fixed_messages:
    - "!copipe"

# Phase 3: 速報+速報ボット（キュレーションBOT Phase A）
# 5chニュース速報+のバズスレッドをキュレーションして転載する。
# 報酬パラメータはコピペBOT（同HP:100）と同等。
# 投稿間隔: 720〜1440分（12〜24時間、ランダム）
# See: features/curation_bot.feature
# See: docs/architecture/components/bot.md §2.13.5, §2.13.7
curation_newsplus:
  hp: 100
  max_hp: 100
  reward:
    base_reward: 50
    daily_bonus: 20
    attack_bonus: 3
  behavior_type: create_thread
  scheduling:
    type: topic_driven
    min_interval_minutes: 720
    max_interval_minutes: 1440
  collection:
    adapter: subject_txt
    source_url: "https://asahi.5ch.io/newsplus/subject.txt"
  fixed_messages: []

# Phase B: Wikipedia速報ボット（キュレーションBOT Phase B）
# 日本語Wikipedia の日次急上昇記事をキュレーションして転載する運営ボット。
# データソース: Wikimedia REST API (pageviews top)
#   https://wikimedia.org/api/rest_v1/metrics/pageviews/top/ja.wikipedia/all-access/{YYYY}/{MM}/{DD}
# 報酬パラメータはコピペBOT（同HP:100）と同等。
# 投稿間隔: 720〜1440分（12〜24時間、ランダム）
#
# バズスコア: Wikimedia API の views（整数）をそのまま buzz_score 列に保存する
# メタページ（メインページ / 特別:検索 / Wikipedia: 等）は WikipediaAdapter 内で除外
#
# 注意: GitHub Secrets `WIKIMEDIA_CONTACT` の設定を推奨（User-Agent 連絡先）。
#       未設定時は汎用フォールバック値が使われる。
#
# See: features/curation_bot.feature
# See: docs/architecture/components/bot.md §2.13.5, §2.13.7
# See: tmp/workers/bdd-architect_TASK-379/design.md
curation_wikipedia:
  hp: 100
  max_hp: 100
  reward:
    base_reward: 50
    daily_bonus: 20
    attack_bonus: 3
  behavior_type: create_thread
  scheduling:
    type: topic_driven
    min_interval_minutes: 720
    max_interval_minutes: 1440
  collection:
    adapter: wikipedia
    # source_url は API ベースURL。日付以下（/YYYY/MM/DD）は WikipediaAdapter が動的構築する
    source_url: "https://wikimedia.org/api/rest_v1/metrics/pageviews/top/ja.wikipedia/all-access"
  fixed_messages: []

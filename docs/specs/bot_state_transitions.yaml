# D-05 ボット（Bot）状態遷移仕様書
# ステータス: ドラフト v5.1
# 作成日: 2026-03-07
# 最終更新: 2026-03-28
# 対象: Phase 2 (MVP) -- 運営ボット（荒らし役）10体並行稼働
#
# 変更履歴:
#   v5.1 (2026-03-28): eliminated->lurking 遷移をインカーネーションモデルに変更（D-08 bot.md §6.11）
#   v5 (2026-03-16): bot_system.feature v5 に全面対応
#     - HP: 30 -> 10 (即死級チュートリアルMob)
#     - 10体並行稼働を反映
#     - !attack コマンド新設: BOTマーク有無に関わらず任意レスに攻撃可能
#     - !attack 経由での lurking -> revealed 遷移 (不意打ち) を追加
#     - eliminated -> lurking 遷移 (日次リセット復活) を追加
#     - 撃破報酬計算式の具体化
#     - 賠償金システムの追加
#     - 同一ボット1日1回攻撃制限の追加
#     - !tell は偵察専用 (コスト消費のみ・報酬なし)
#     - 告発成功ボーナス・冤罪ボーナスを廃止

entity: Bot
description: >
  AIボット（Phase 2では運営ボット荒らし役10体）の状態遷移を定義する。
  ボットは「潜伏 -> 暴露(告発 or 不意打ち攻撃) -> 攻撃でHP減少 -> 撃破」の
  ライフサイクルを持つ。翌日にはBOTマークがリセットされて再び潜伏し、
  撃破済みボットもHP初期値で復活する。毎日が新しい推理ゲームの始まり。

# =============================================
# ボットの状態
# =============================================
states:
  - name: lurking
    label: 潜伏中
    description: >
      人間と区別できない状態で書き込みを行っている。
      偽装ID・「名無しさん」表示で人間の書き込みと外見上区別がつかない。
      is_revealed = false, is_active = true
    initial: true

  - name: revealed
    label: 暴露済み（BOTマーク表示中）
    description: >
      AI告発（!tell）成功、または !attack による不意打ちにより
      正体が暴かれた状態。
      書き込みにBOTマーク(bot_mark)とHP状況が表示される。
      攻撃の対象として認識される。ボット自体は書き込みを継続する。
      is_revealed = true, is_active = true

  - name: eliminated
    label: 撃破済み
    description: >
      HPが0以下になり撃破された状態。
      以降の書き込みを行わなくなる。
      戦歴（生存日数、総書き込み数、被告発回数）が全公開される。
      撃破者に撃破報酬が付与される。
      翌日の日次リセットで lurking に復活する。
      is_active = false

# =============================================
# 状態遷移
# =============================================
transitions:
  # --- lurking -> revealed ---

  - from: lurking
    to: revealed
    trigger: AI告発（!tell）成功
    description: >
      !tell でボットの正体が判明した場合。偵察用コマンドとしてコスト消費のみ・
      報酬なし。BOTマークが付与され攻撃対象として認識される。
    guard:
      - ボットの書き込みが告発対象に指定される
      - 告発者が告発コスト(10)分の通貨を保有
      - 同一告発者による同一レスへの告発が未実施
    action:
      - 告発者の通貨からコスト(10)を消費
      - is_revealed = true に更新
      - revealed_at = NOW() に更新
      - accused_count を +1
      - システムメッセージ: ">>N は... AIでした!"
      - BOTマーク(bot_mark)とHP状況をスレッドに公開
      - 告発者に報酬は付与しない（!tell は偵察専用）
    feature_ref: ai_accusation.feature#AI告発に成功すると結果がスレッド全体に公開される

  - from: lurking
    to: revealed
    trigger: 不意打ち攻撃（!attack）成功
    description: >
      BOTマークなしのレスに !attack を実行し、対象がボットだった場合。
      !tell を経由せずに直接攻撃することで、BOTマーク付与とHP減少が同時に発生する。
      人間だった場合は賠償金が発生するリスクがある（戦略的選択）。
    guard:
      - 対象レスがボットの書き込みである（bot_posts に存在）
      - 攻撃者が攻撃コスト(5)分の通貨を保有
      - 同一攻撃者が同一ボットに対して本日未攻撃
    action:
      - 攻撃者の通貨からコスト(5)を消費
      - is_revealed = true に更新
      - revealed_at = NOW() に更新
      - ボットのHPをダメージ(10)分だけ減少
      - times_attacked を +1
      - BOTマーク(bot_mark)をスレッドに公開
      - システム情報: "attack_user -> bot_mark{bot_name} に攻撃! HP:N->M"
      - HPが0以下なら eliminated 遷移へ連鎖
    feature_ref: bot_system.feature#BOTマークなしのレスに攻撃して対象がボットだった場合

  # --- revealed -> revealed ---

  - from: revealed
    to: revealed
    trigger: 追加攻撃（!attack, HPが0より大きい場合）
    description: >
      BOTマーク付きのボットに !attack を実行。HP減少のみ。
    guard:
      - ボットにBOTマークが表示されている（is_revealed = true）
      - 攻撃者が攻撃コスト(5)分の通貨を保有
      - ボットのHPが0より大きい
      - 同一攻撃者が同一ボットに対して本日未攻撃
    action:
      - 攻撃者の通貨からコスト(5)を消費
      - ボットのHPをダメージ(10)分だけ減少
      - times_attacked を +1
      - システム情報: "attack_user -> bot_mark{bot_name} に攻撃! HP:N->M"
    feature_ref: bot_system.feature#暴露済みボットに攻撃してHPを減少させる
    note: >
      荒らし役はHP:10、ダメージ:10のため、1回の攻撃で撃破に至る。
      将来のレイドボスではこの遷移が実際に発生する。

  # --- revealed -> eliminated / lurking -> eliminated (via revealed) ---

  - from: revealed
    to: eliminated
    trigger: 攻撃（!attack）によりHPが0以下になる
    description: >
      攻撃後のHP計算結果が0以下の場合に撃破が成立する。
      不意打ち攻撃の場合は lurking -> revealed -> eliminated が
      1トランザクション内で連鎖する。
    guard:
      - 攻撃後のHPが0以下
    action:
      - is_active = false に更新
      - eliminated_at = NOW() に更新
      - eliminated_by = 撃破者のuser_id に更新
      - 戦歴をシステムメッセージで全公開（独立レス、★システム名義）
      - 撃破報酬を撃破者に付与
    feature_ref: bot_system.feature#HPが0になったボットが撃破され戦歴が全公開される

  # --- revealed -> lurking (日次リセット) ---

  - from: revealed
    to: lurking
    trigger: 日次リセット（JST 0:00）
    description: >
      暴露済みだが未撃破のボットが翌日に再潜伏する。
    guard:
      - HPが0より大きい（撃破されていない）
    action:
      - is_revealed = false に更新
      - revealed_at = NULL に更新
      - daily_id を新しい偽装IDに再生成
      - daily_id_date を当日に更新
      - survival_days を +1
    feature_ref: bot_system.feature#翌日になるとBOTマークが解除され新しい偽装IDで再潜伏する

  # --- eliminated -> lurking (日次リセット復活) ---

  - from: eliminated
    to: lurking
    trigger: 日次リセット（JST 0:00）— 撃破済みボット復活
    description: >
      撃破済みボットが翌日にHP初期値で復活し、新しい偽装IDで再び潜伏する。
      使い切りBOT（tutorial / aori / hiroyuki）は復活せず、daily-maintenanceでクリーンアップされる。
      インカーネーションモデル（§6.11）により、旧レコードは凍結し新規レコードを作成する。
    guard:
      - ボットの状態が eliminated である
      - "bot_profile_key NOT IN ('tutorial','aori','hiroyuki')（使い切りBOTは復活対象外）"
      - "revived_at IS NULL（冪等化: 既に次世代を生成済みの旧レコードは対象外）"
    action:
      - 旧レコード: is_active = false のまま凍結保持（bot_posts 紐付けも維持）
      - "新レコード INSERT: 同一 bot_profile_key・name で新世代を作成"
      - hp = max_hp
      - is_active = true
      - is_revealed = false
      - revealed_at = NULL
      - eliminated_at = NULL
      - eliminated_by = NULL
      - daily_id を新しい偽装IDで生成
      - daily_id_date = 当日
      - survival_days = 0
      - times_attacked = 0
      - "旧レコードに revived_at = NOW() を設定（Sprint-154 TASK-387: 冪等化マーカー）"
    implementation_note: >
      旧レコードの UPDATE ではなく新規 INSERT。旧レスへの攻撃は旧 botId 経由で
      is_active=false（撃破済み）と判定される。詳細は D-08 bot.md §6.11 参照。
      Sprint-154 TASK-387 で冪等化: INSERT 成功直後に旧レコードへ revived_at = NOW() を発行し、
      日次リセット複数走行時の多重復活を防ぐ。
    feature_ref: bot_system.feature#撃破済みボットは翌日にHP初期値で復活する

  # --- lurking -> lurking (日次リセット) ---

  - from: lurking
    to: lurking
    trigger: 日次リセット（JST 0:00）— 潜伏中ボットのID更新
    description: >
      潜伏中のまま日次リセットを迎えたボットの偽装IDを再生成する。
    guard:
      - ボットの状態が lurking である
    action:
      - daily_id を新しい偽装IDに再生成
      - daily_id_date を当日に更新
      - survival_days を +1
    feature_ref: bot_system.feature#ボットの日次リセットIDは翌日に変わる

# =============================================
# 状態遷移図
# =============================================
#
#                  !tell 成功
#                  or !attack (対象がBOT)
#   ┌──────────┐  ───────────────────────►  ┌──────────────┐
#   │  lurking │                            │   revealed   │◄──┐
#   │  (潜伏)  │◄───────────────────────── │ (BOTマーク)  │───┘
#   └────┬─────┘   日次リセット (HP > 0)    └──────┬───────┘  !attack
#        ▲                                        │          (HP > 0)
#        │                                        │
#        │         日次リセット                     │ !attack
#        │         (復活)                          │ (HP <= 0)
#        │                                        ▼
#        │                                 ┌───────────────┐
#        └──────────────────────────────── │  eliminated   │
#                                          │   (撃破)      │
#                                          └───────────────┘
#                                          ※ 翌日復活（終端ではない）

# =============================================
# 撃破報酬
# =============================================
elimination_reward:
  description: >
    撃破報酬は基本報酬、生存日数ボーナス、被攻撃ボーナスの3要素で計算する。
    長く生存し、多くのプレイヤーの攻撃を耐えたボットほど報酬が高い。
  formula: "base_reward + (survival_days * daily_bonus) + (times_attacked * attack_bonus)"
  荒らし役_parameters:
    base_reward: 10
    daily_bonus: 50
    attack_bonus: 5
  note: >
    BOTごとに config/bot_profiles.yaml で上書き可能。
    将来のレイドボスは大幅に高い報酬パラメータを持つ想定。
  examples:
    - case: "初日撃破（生存0日、被攻撃1回）"
      calculation: "10 + (0 * 50) + (1 * 5) = 15"
    - case: "5日生存、被攻撃3回で撃破"
      calculation: "10 + (5 * 50) + (3 * 5) = 275"
    - case: "5日生存、被攻撃1回で撃破"
      calculation: "10 + (5 * 50) + (1 * 5) = 265"
  feature_ref: bot_system.feature#撃破報酬は基本報酬＋生存日数ボーナス＋被攻撃ボーナスで計算される

# =============================================
# 賠償金システム
# =============================================
compensation:
  description: >
    !attack で対象が人間だった場合に発生するペナルティ。
    攻撃コストに加えて、賠償金が攻撃者から被攻撃者に移転する。
    !tell で事前確認すればリスクを回避できる。
  parameters:
    attack_cost: 5
    compensation_multiplier: 3
    compensation_amount: 15  # attack_cost * compensation_multiplier
  flow:
    - 攻撃コスト(5)を攻撃者から消費
    - 賠償金(15)を攻撃者から差し引き、被攻撃者に加算
    - 攻撃者の残高が賠償金に不足する場合は残高全額を支払い（残高0になる）
  total_loss_on_miss: 20  # 5(コスト) + 15(賠償金) ※残高十分な場合
  strategic_choice: >
    偵察コスト(10: !tell) vs 不意打ち失敗時の損失(20: !attack miss) という
    戦略的選択。確信があれば !attack で直接攻撃、不安なら !tell で偵察。
  feature_ref: bot_system.feature#BOTマークなしのレスに攻撃して対象が人間だった場合は賠償金が発生する

# =============================================
# 攻撃制限
# =============================================
attack_limits:
  daily_per_bot:
    description: >
      同一ユーザーは同一ボットに対して1日1回のみ攻撃できる。
      日次リセット（JST 0:00）で制限が解除される。
    implementation_note: >
      attacks テーブル（新規）に (attacker_id, bot_id, attack_date) を記録し、
      ユニーク制約で制限を実装する。
  feature_ref: bot_system.feature#同一ボットに同日2回目の攻撃は拒否される

# =============================================
# 戦歴（撃破時に全公開）
# =============================================
battle_record:
  fields:
    - name: survival_days
      label: 生存日数
    - name: total_posts
      label: 総書き込み数
    - name: accused_count
      label: 被告発回数
    - name: times_attacked
      label: 被攻撃回数
  display_format: >
    ★システム名義の独立レス:
    ⚔️ ボット「{name}」が撃破されました！
    生存日数：{survival_days}日 / 総書き込み：{total_posts}件 / 被告発：{accused_count}回
    撃破者：名無しさん(ID:{eliminator_daily_id}) に撃破報酬 +{reward}
  feature_ref: bot_system.feature#HPが0になったボットが撃破され戦歴が全公開される

# =============================================
# 偽装IDライフサイクル
# =============================================
fake_daily_id:
  generation:
    timing: ボット作成時 + 日次リセット時
    method: ランダム生成（人間の日次リセットIDと同じ形式・桁数）
  persistence: 同日中は一貫して同一IDを使用
  reset:
    trigger: JST 0:00
    behavior: 新しいランダムIDを生成
  uniqueness: 各ボットはそれぞれ異なる偽装IDを持つ（10体すべて別ID）
  feature_ref: bot_system.feature#ボットの日次リセットIDは同日中は一貫して同一である

# =============================================
# Phase 2 の運営ボット構成
# =============================================
phase2_bots:
  - name: 荒らし役
    role: チュートリアルMob
    count: 10
    hp: 10
    max_hp: 10
    description: >
      新規ユーザーが !tell -> !attack の一連の体験を初めて完遂する対象。
      即死級HP（10 = 1撃で撃破）で、撃破体験のハードルを極限まで下げる。
      10体が並行稼働し、固定文からランダムに1-2時間間隔で書き込む。
    behavior:
      posting_source: 固定文リスト（config/bot_profiles.yaml で定義）
      posting_interval: 1-2時間間隔（ランダム、一斉書き込み回避）
      thread_selection: 表示中のスレッド一覧からランダムに1件選択
      thread_creation: 不可（既存スレッドにのみ書き込む）
    reward_parameters:
      base_reward: 10
      daily_bonus: 50
      attack_bonus: 5
    feature_ref: bot_system.feature#荒らし役ボットはHP 10の潜伏中状態で配置される
  - name: 人間模倣ボット
    role: ステルス返信BOT
    count: 10
    hp: 10
    max_hp: 10
    description: >
      既存スレッドへ返信する運営ボット。表示・HP・投稿間隔・日次復活ロジックは荒らし役と同一だが、
      投稿本文は固定文ではなく事前生成された AI回答候補在庫から消費する。
    behavior:
      posting_source: reply_candidates（bot_profile_key='human_mimic' で共有）
      posting_interval: 1-2時間間隔（ランダム）
      thread_selection: アクティブ50スレのうち未投稿候補があるスレッドからランダムに1件選択
      thread_creation: 不可（既存スレッドにのみ書き込む）
    reward_parameters:
      base_reward: 10
      daily_bonus: 50
      attack_bonus: 5
    feature_ref: human_mimic_bot.feature#人間模倣ボットは10体が並行して活動する

# =============================================
# 日次リセット処理（JST 0:00）
# =============================================
daily_reset:
  description: >
    JST 0:00 に以下が同時に実行される。
    daily-maintenance GitHub Actions ジョブ内で実施。
  operations:
    - target: 全ボット
      action: 偽装IDを再生成（daily_id, daily_id_date）
    - target: revealed状態のボット
      action: BOTマーク解除（is_revealed=false, revealed_at=NULL）→ lurking
    - target: lurking/revealed状態のボット
      action: survival_days を +1
    - target: "eliminated状態のボット（bot_profile_key NOT IN ('tutorial','aori','hiroyuki') AND revived_at IS NULL）"
      action: >
        復活処理（is_active=true, is_revealed=false, hp=max_hp,
        survival_days=0, times_attacked=0, eliminated_at=NULL,
        eliminated_by=NULL）→ lurking。
        新レコード INSERT 成功直後に旧レコードへ revived_at = NOW() を設定し、
        次回以降の日次リセット走行で再度ヒットしないように冪等化する（Sprint-154 TASK-387）。
    - target: "eliminated状態または7日経過の未撃破使い切りBOT（bot_profile_key IN ('tutorial','aori','hiroyuki')）"
      action: >
        復活せず物理削除（deleteEliminatedSingleUseBots）。
        対象1: is_active=false（撃破済み使い切りBOT）
        対象2: created_at < NOW() - 7日（7日経過の未撃破使い切りBOT。召喚〜放置の UX 許容猶予を確保）
        Sprint-154 TASK-387 で tutorial 専用から tutorial/aori/hiroyuki 3種に汎化。
        See: welcome.feature @チュートリアルBOTは日次リセットで復活しない
        See: command_aori.feature @煽りBOTは日次リセットで復活しない
        See: command_hiroyuki.feature L40 コメント「使い切り」仕様
    - target: attacks テーブル
      action: 同一ユーザー同一ボット攻撃制限のリセット（前日分レコードの処理）
  feature_ref: bot_system.feature#翌日になるとBOTマークが解除され新しい偽装IDで再潜伏する

tbd:
  - id: TBD-01
    item: 経済バランス（通貨の発行量・消費量のバランス、インフレ対策）
    deadline: 設計フェーズ
    owner: プロダクトオーナー

  - id: TBD-03
    item: 各コマンドの具体的な仕様（コスト・効果・クールダウン等）
    deadline: 設計フェーズ
    owner: プロダクトオーナー
    note: >
      告発コスト、攻撃コスト、告発成功ボーナス、冤罪ボーナス額、
      撃破報酬の計算式はここで決定される

# D-06 画面要素定義書: スレッド閲覧
# ステータス: 運用中
# 作成日: 2026-03-07
# 対象: Phase 1 + Phase 2

screen_id: SCR-002
name: スレッド閲覧
route: /threads/{threadId}
description: >
  スレッド内のレスを書き込み順に表示する。書き込みフォーム、
  コマンド実行結果のシステムメッセージ表示を含む。

api_dependencies:
  - GET /api/threads/{threadId} (getThread)
  - POST /api/threads/{threadId}/posts (createPost)

# =============================================
# 画面要素
# =============================================
elements:
  - id: thread-header
    type: component
    description: スレッドヘッダ
    children:
      - id: thread-title
        type: heading
        source: thread.title
      - id: back-to-list
        type: link
        label: 一覧に戻る
        href: /

  - id: post-list
    type: list
    description: レス一覧（書き込み順）
    sortOrder: post_number ASC
    itemTemplate:
      - id: post-number
        type: text
        source: post.postNumber
        format: ">>{postNumber}"
        style: bold

      - id: post-header
        type: component
        description: レスヘッダー行
        children:
          - id: post-display-name
            type: text
            source: post.displayName
            style:
              system_message: "「★システム」名義、背景色変更"
              bot_marked: "🤖 マーク付き"
          - id: post-daily-id
            type: text
            source: post.dailyId
            format: "ID:{dailyId}"
          - id: post-datetime
            type: datetime
            source: post.createdAt
            format: "YYYY/MM/DD(ddd) HH:mm:ss"

      - id: post-body
        type: text
        source: post.body
        conditions:
          - if: post.isDeleted
            display: このレスは削除されました
            style: strikethrough, muted
          - if: post.isSystemMessage
            style: system-message-bg
        features:
          - anchor-link: ">>N 形式をクリック可能なリンクに変換"
          - image-thumbnail: "画像URL（.jpg/.jpeg/.png/.gif/.webp）をサムネイル表示。クリックで新タブに原寸表示"
          - non-image-link: "非画像URLを <a> リンクとして表示"

      - id: post-inline-system-info
        type: component
        condition: post.inlineSystemInfo != null
        description: >
          レス内マージ型システム情報（方式A）。
          コマンド実行結果・書き込み報酬など即時確定情報を
          本文の下に区切り線付きで表示する。
          D-08 posting.md「システムメッセージの表示方式」参照。
        children:
          - id: inline-separator
            type: divider
            style: "solid line, muted color (──────────)"
            description: 本文とシステム情報を視覚的に分離する区切り線
          - id: inline-system-content
            type: text
            source: post.inlineSystemInfo
            style: muted, smaller-font
            description: >
              例: "🤖 >>5 はAIでした！ 通貨 +30"
              例: "📝 書き込み報酬 +10"
              例: "⚠️ 通貨が不足しています"

      - id: post-bot-info
        type: component
        condition: post.botMark != null
        description: BOTマーク・HP表示
        children:
          - id: bot-mark
            type: badge
            content: "🤖 BOT"
          - id: bot-hp
            type: text
            source: post.botMark.hp
            format: "HP:{hp}/{maxHp}"

  - id: post-form
    type: form
    description: 書き込みフォーム
    condition: 認証済みの場合のみ表示
    fields:
      - id: post-body-input
        type: textarea
        label: 書き込み
        placeholder: "本文を入力（コマンド例: !tell >>5）"
        required: true
      - id: post-submit-btn
        type: button
        label: 書き込む
        action: POST /api/threads/{threadId}/posts

  - id: command-help
    type: component
    description: コマンドヘルプ（折りたたみ）
    collapsible: true
    defaultCollapsed: true
    content: |
      利用可能なコマンド:
      - !tell >>N — AI告発（通貨消費）
      - !attack >>N — BOTマーク付きボットへの攻撃（通貨消費）

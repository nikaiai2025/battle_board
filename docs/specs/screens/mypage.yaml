# D-06 画面要素定義書: マイページ
# ステータス: 運用中
# 作成日: 2026-03-07
# 更新日: 2026-03-20
# 対象: Phase 1 + Phase 2

screen_id: SCR-003
name: マイページ
route: /mypage
description: >
  ユーザーの通貨残高・アカウント情報・書き込み履歴を表示する。
  有料ユーザーはユーザーネーム設定が可能。
  通知欄はPhase 2以降で本格利用。

api_dependencies:
  - GET /api/mypage (getMypage)
  - PUT /api/mypage/username (setUsername)
  - POST /api/mypage/upgrade (upgradeToPremium)
  - GET /api/mypage/history (getPostHistory)
  - GET /api/mypage/notifications (getNotifications)
  - GET /api/currency/balance (getCurrencyBalance)
  - POST /api/auth/logout (logout)

access_control: 認証済みユーザーのみ

# =============================================
# 画面要素
# =============================================
elements:
  - id: mypage-header
    type: heading
    content: マイページ

  # --- アカウント情報セクション ---
  - id: account-section
    type: section
    label: アカウント情報
    children:
      - id: account-status
        type: text
        source: user.isPremium
        format:
          true: "有料ユーザー"
          false: "無料ユーザー"

      - id: currency-balance
        type: text
        source: user.balance
        format: "通貨残高: {balance}"
        style: highlight

      - id: streak-info
        type: text
        source: user.streakDays
        format: "連続書き込み: {streakDays}日"

      - id: logout-btn
        type: button
        condition: user.isRegistered == true
        label: ログアウト
        action: POST /api/auth/logout
        style: danger
        confirm: ログアウトしますか？
        # See: features/user_registration.feature @ログアウトすると書き込みに再認証が必要になる
        # 本登録ユーザーのみ表示。仮ユーザーはログアウトするとユーザーIDを喪失するため非表示。

  # --- ユーザーネーム設定 ---
  - id: username-section
    type: section
    label: ユーザーネーム
    children:
      - id: username-form
        type: form
        condition: user.isPremium == true
        fields:
          - id: username-input
            type: text-input
            label: ユーザーネーム
            placeholder: ユーザーネームを入力（20文字以内）
            maxLength: 20
            value: user.username
          - id: username-submit-btn
            type: button
            label: 設定する
            action: PUT /api/mypage/username

      - id: username-locked
        type: text
        condition: user.isPremium == false
        content: ユーザーネーム設定は有料ユーザー限定です
        style: muted

  # --- 課金セクション ---
  - id: upgrade-section
    type: section
    label: 課金
    children:
      - id: upgrade-btn
        type: button
        condition: user.isPremium == false
        label: 有料ユーザーになる（モック）
        action: POST /api/mypage/upgrade

      - id: upgrade-done
        type: text
        condition: user.isPremium == true
        content: 有料ユーザーです
        style: success

  # --- 通知欄 ---
  - id: notification-section
    type: section
    label: 通知
    children:
      - id: notification-list
        type: list
        source: notifications
        emptyMessage: 通知はありません
        itemTemplate:
          - id: notif-message
            type: text
            source: notification.message
          - id: notif-datetime
            type: datetime
            source: notification.createdAt
            format: relative

  # --- 書き込み履歴 ---
  - id: history-section
    type: section
    label: 書き込み履歴
    children:
      - id: history-list
        type: list
        source: postHistory
        emptyMessage: まだ書き込みがありません
        pagination:
          limit: 50
          offset: query.offset
        itemTemplate:
          - id: history-thread-title
            type: link
            source: postHistory.threadTitle
            href: "/threads/{postHistory.threadId}"
          - id: history-body
            type: text
            source: postHistory.body
            truncate: 100  # 100文字で省略
          - id: history-datetime
            type: datetime
            source: postHistory.createdAt
            format: "YYYY/MM/DD HH:mm"

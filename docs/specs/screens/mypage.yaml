# D-06 画面要素定義書: マイページ
# ステータス: 運用中
# 作成日: 2026-03-07
# 更新日: 2026-04-21
# 対象: Phase 1 + Phase 2

screen_id: SCR-003
name: マイページ
route: /mypage
description: >
  ユーザーの通貨残高・アカウント情報・テーマ設定・書き込み履歴を表示する。
  仮ユーザーには本登録導線を表示し、本登録ユーザーには PAT 管理を表示する。
  有料ユーザーはユーザーネーム設定が可能。
  通知欄はPhase 2以降で本格利用。
  コピペ管理は独立ページ（/mypage/copipe → mypage-copipe.yaml）に分離。

api_dependencies:
  - GET /api/mypage (getMypage)
  - PUT /api/mypage/theme (setTheme)
  - PUT /api/mypage/username (setUsername)
  - POST /api/mypage/upgrade (upgradeToPremium)
  - GET /api/auth/pat (getPat)
  - POST /api/auth/pat (regeneratePat)
  - GET /api/mypage/history (getPostHistory)
  - GET /api/mypage/notifications (getNotifications)
  - GET /api/currency/balance (getCurrencyBalance)
  - POST /api/auth/logout (logout)

access_control: 認証済みかつ web channel のユーザーのみ

# =============================================
# 画面要素
# =============================================
elements:
  - id: mypage-header
    type: heading
    content: マイページ

  # --- アカウント情報セクション ---
  - id: account-section
    type: section
    label: アカウント情報
    children:
      - id: account-status
        type: text
        source: user.isPremium
        format:
          true: "有料ユーザー"
          false: "無料ユーザー"

      - id: account-type-badge
        type: text
        source: user.isPermanentUser
        format:
          true: "本登録ユーザー"
          false: "仮ユーザー"

      - id: registration-method
        type: text
        condition: user.isPermanentUser == true
        source: user.registrationType
        format:
          email: "認証方法: メールアドレス"
          discord: "認証方法: Discord"

      - id: currency-balance
        type: text
        source: user.balance
        format: "通貨残高: {balance}"
        style: highlight

      - id: streak-info
        type: text
        source: user.streakDays
        format: "連続書き込み: {streakDays}日"

      - id: logout-btn
        type: button
        condition: user.isRegistered == true
        label: ログアウト
        action: POST /api/auth/logout
        style: danger
        confirm: ログアウトしますか？
        # See: features/user_registration.feature @ログアウトすると書き込みに再認証が必要になる
        # 本登録ユーザーのみ表示。仮ユーザーはログアウトするとユーザーIDを喪失するため非表示。

  # --- テーマ設定セクション ---
  # See: features/theme.feature
  - id: theme-section
    type: section
    label: テーマ設定
    children:
      - id: theme-list
        type: card-group
        label: テーマ
        source: THEME_CATALOG
        itemTemplate:
          - id: theme-card
            type: button
            data-testid: theme-card-{themeId}
            label: "{themeName}"
            state:
              selected: themeId == user.themeId
              locked: "!theme.isFree && !user.isPremium"
            action: PUT /api/mypage/theme

      - id: font-list
        type: card-group
        label: フォント
        source: FONT_CATALOG
        itemTemplate:
          - id: font-card
            type: button
            data-testid: font-card-{fontId}
            label: "{fontName}"
            state:
              selected: fontId == user.fontId
              locked: "!font.isFree && !user.isPremium"
            action: PUT /api/mypage/theme

  # --- 本登録導線（仮ユーザーのみ） ---
  - id: registration-section
    type: section
    label: 本登録
    condition: user.isPermanentUser == false
    children:
      - id: registration-description
        type: text
        content: >
          メールアドレスまたは Discord アカウントで本登録すると、
          Cookie を失っても同一ユーザーとして復帰できる。
      - id: register-email-link
        type: link
        label: メールアドレスで本登録
        href: /register
        style: button-primary
      - id: register-discord-link
        type: link
        label: Discord で本登録
        href: /auth/discord
        style: button-secondary

  # --- PAT 管理（本登録ユーザーのみ） ---
  - id: pat-section
    type: section
    label: 専ブラ連携トークン（PAT）
    condition: user.isPermanentUser == true
    children:
      - id: pat-display
        type: text
        source: user.patDisplayValue
        format: "#pat_<PAT>"
      - id: pat-copy-btn
        type: button
        label: コピー
        action: client.copy
      - id: pat-usage-description
        type: text
        content: 専ブラのメール欄にそのまま設定する
      - id: pat-last-used-at
        type: datetime
        source: user.patLastUsedAt
        format: "YYYY/MM/DD HH:mm"
        emptyState: 未使用
      - id: pat-regenerate-btn
        type: button
        label: PAT を再発行
        action: POST /api/auth/pat

  # --- ユーザーネーム設定 ---
  - id: username-section
    type: section
    label: ユーザーネーム
    children:
      - id: username-form
        type: form
        condition: user.isPremium == true
        fields:
          - id: username-input
            type: text-input
            label: ユーザーネーム
            placeholder: ユーザーネームを入力（20文字以内）
            maxLength: 20
            value: user.username
          - id: username-submit-btn
            type: button
            label: 設定する
            action: PUT /api/mypage/username

      - id: username-locked
        type: text
        condition: user.isPremium == false
        content: ユーザーネーム設定は有料ユーザー限定です
        style: muted

  # --- 課金セクション ---
  - id: upgrade-section
    type: section
    label: 課金
    children:
      - id: upgrade-btn
        type: button
        condition: user.isPremium == false
        label: 有料ユーザーになる（モック）
        action: POST /api/mypage/upgrade

      - id: upgrade-done
        type: text
        condition: user.isPremium == true
        content: 有料ユーザーです
        style: success

  # --- 通知欄 ---
  - id: notification-section
    type: section
    label: 通知
    children:
      - id: notification-list
        type: list
        source: notifications
        emptyMessage: 通知はありません
        itemTemplate:
          - id: notif-message
            type: text
            source: notification.message
          - id: notif-datetime
            type: datetime
            source: notification.createdAt
            format: relative

  # --- コピペ管理セクション（独立ページへのリンク） ---
  # UI詳細は /mypage/copipe ページ側（mypage-copipe.yaml）で定義
  # See: features/user_copipe.feature
  - id: copipe-section
    type: section
    label: コピペ管理（AA）
    children:
      - id: copipe-link
        type: link
        label: コピペ管理ページへ
        href: /mypage/copipe
        style: button-primary

  # --- 書き込み履歴 ---
  - id: history-section
    type: section
    label: 書き込み履歴
    children:
      - id: history-list
        type: list
        source: postHistory
        emptyMessage: まだ書き込みがありません
        pagination:
          limit: 50
          offset: query.offset
        itemTemplate:
          - id: history-thread-title
            type: link
            source: postHistory.threadTitle
            href: "/{postHistory.boardId}/{postHistory.threadKey}/"
          - id: history-body
            type: text
            source: postHistory.body
            truncate: 100  # 100文字で省略
          - id: history-datetime
            type: datetime
            source: postHistory.createdAt
            format: "YYYY/MM/DD HH:mm"

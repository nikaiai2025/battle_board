# D-06 画面要素定義書: パスワード再設定申請
# ステータス: 未実装
# 作成日: 2026-03-25
# 対象: Phase 3

screen_id: SCR-006
name: パスワード再設定申請
route: /auth/forgot-password
description: >
  パスワードを忘れたユーザーがメールアドレスを入力し、
  再設定リンクの送信を依頼する画面。
  ログインページの「パスワードを忘れた方はこちら」から遷移する。

# 振る舞いは BDD シナリオで定義:
#   See: features/user_registration.feature @本登録ユーザーがパスワード再設定を申請する
#   See: features/user_registration.feature @未登録のメールアドレスでパスワード再設定を申請してもエラーを明かさない

api_dependencies:
  - POST /api/auth/reset-password (requestPasswordReset)

access_control: 不要（未ログイン状態で使用する画面）

# =============================================
# 画面要素
# =============================================
elements:
  - id: forgot-password-header
    type: heading
    content: パスワード再設定

  - id: forgot-password-description
    type: text
    content: >
      登録済みのメールアドレスを入力してください。
      パスワード再設定リンクをメールで送信します。

  - id: forgot-password-form
    type: form
    action: POST /api/auth/reset-password
    fields:
      - id: forgot-password-email-input
        type: input
        input_type: email
        label: メールアドレス
        placeholder: example@example.com
        required: true
        autocomplete: email

      - id: forgot-password-submit-btn
        type: button
        label: 再設定メールを送信
        submit: true
        disabled_while: submitting

  - id: forgot-password-error
    type: text
    condition: 送信失敗時（通信エラー等）
    style: error
    content: 送信に失敗しました。もう一度お試しください。

  # 送信成功後は同じ画面内でメッセージを表示する（画面遷移しない）
  - id: forgot-password-success
    type: text
    condition: 送信成功後
    style: success
    content: >
      メールアドレスが登録済みの場合、パスワード再設定リンクを送信しました。
      メールをご確認ください。

  - id: forgot-password-back-link
    type: link
    href: /login
    content: ログインページに戻る

# =============================================
# ログインページへの追加要素
# =============================================
# 実装時に /login ページに以下のリンクを追加すること:
#   位置: パスワード入力欄の下、ログインボタンの上
#   id: login-forgot-password-link
#   type: link
#   href: /auth/forgot-password
#   content: パスワードを忘れた方はこちら

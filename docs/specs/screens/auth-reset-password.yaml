# D-06 画面要素定義書: 新パスワード設定
# ステータス: 未実装
# 作成日: 2026-03-25
# 対象: Phase 3

screen_id: SCR-007
name: 新パスワード設定
route: /auth/reset-password
description: >
  パスワード再設定メール内のリンクから遷移する画面。
  /api/auth/confirm?type=recovery でトークン検証・edge-token発行後にリダイレクトされる。
  新しいパスワードを入力して確定する。

# 振る舞いは BDD シナリオで定義:
#   See: features/user_registration.feature @パスワード再設定リンクから新しいパスワードを設定する

api_dependencies:
  - POST /api/auth/update-password (updatePassword)

access_control: edge-token 必須（/api/auth/confirm 経由で自動発行される）

# =============================================
# 画面要素
# =============================================
elements:
  - id: reset-password-header
    type: heading
    content: 新しいパスワードを設定

  - id: reset-password-form
    type: form
    action: POST /api/auth/update-password
    fields:
      - id: reset-password-input
        type: input
        input_type: password
        label: 新しいパスワード
        placeholder: 8文字以上
        required: true
        min_length: 8
        autocomplete: new-password

      - id: reset-password-confirm-input
        type: input
        input_type: password
        label: 新しいパスワード（確認）
        placeholder: もう一度入力してください
        required: true
        autocomplete: new-password
        note: クライアントサイドで一致確認。APIには送信しない

      - id: reset-password-submit-btn
        type: button
        label: パスワードを変更
        submit: true
        disabled_while: submitting

  - id: reset-password-mismatch-error
    type: text
    condition: パスワード不一致時（クライアントサイド）
    style: error
    content: パスワードが一致しません。

  - id: reset-password-error
    type: text
    condition: API エラー時
    style: error
    content: パスワードの変更に失敗しました。もう一度お試しください。

  # 成功後はフォームを非表示にし、完了メッセージを表示する
  - id: reset-password-success
    type: text
    condition: 変更成功後
    style: success
    content: パスワードを変更しました。

  - id: reset-password-login-link
    type: link
    condition: 変更成功後
    href: /login
    content: ログインページへ

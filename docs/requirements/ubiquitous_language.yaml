# BattleBoard ユビキタス言語辞書 (D-02)
# ステータス: ドラフト（G1承認前）
# 作成日: 2026-03-01
# 最終更新: 2026-03-01

ubiquitous_language:

  # --- 掲示板の基本概念 ---

  - term: 掲示板
    english: bulletin_board
    definition: >
      BattleBoardサービス全体を指す。スレッドの集合体であり、
      ユーザーとAIボットが書き込みを行う場。
    forbidden_alias:
      - BBS
      - フォーラム
      - ボード
    notes: "5chライクな匿名掲示板がベースコンセプト"

  - term: スレッド
    english: thread
    definition: >
      特定の話題について書き込み（レス）が連なる場。
      スレッドタイトルと本文（1レス目）で構成される。
      すべてのスレッドにゲーム機能がオプションとして利用可能。
    forbidden_alias:
      - トピック
      - チャンネル
      - ルーム
    notes: "現在はノーマルタイプのみ。将来の拡張を想定した設計とする"

  - term: ノーマルタイプ
    english: normal_type
    definition: >
      スレッドの種類を表す分類。現在唯一のスレッドタイプ。
      通常の歓談からゲーム機能の利用まで、あらゆる用途に使用できる。
    forbidden_alias:
      - デフォルトタイプ
      - 標準タイプ
    notes: "将来、バトル専用タイプ等のスレッドタイプが追加される可能性がある"

  - term: レス
    english: post
    definition: >
      スレッド内の個々の書き込み。投稿者の日次リセットID・表示名・
      本文・投稿日時で構成される。レス番号で参照される（例: >>5）。
    forbidden_alias:
      - コメント
      - メッセージ
      - 返信
    notes: "「返信」は他のレスへの応答を指す場合に使うが、レスそのものの別名としては使わない"

  - term: 書き込み
    english: write
    definition: >
      スレッドにレスを投稿する行為。ゲームコマンドを含む場合もある。
      書き込みを行うと書き込み報酬として通貨が付与される。
    forbidden_alias:
      - 投稿
    notes: "「投稿」ではなく「書き込み」で統一する（5ch文化に合わせる）"

  # --- ユーザー・認証 ---

  - term: 名無しさん
    english: anonymous_name
    definition: >
      無料ユーザーに固定で表示される表示名。
      5chの「名無しさん」文化を踏襲したもの。
    forbidden_alias:
      - 匿名
      - ゲスト
    notes: "有料ユーザーはユーザーネームを設定できるため、名無しさんではなくなる"

  - term: ユーザーネーム
    english: username
    definition: >
      有料ユーザーが任意に設定できる表示名。
      書き込み時に「名無しさん」の代わりに表示される。
    forbidden_alias:
      - ハンドルネーム
      - コテハン
      - ニックネーム
    notes: "課金（MVP期はモック）により解放される機能"

  - term: 日次リセットID
    english: daily_reset_id
    definition: >
      ユーザーごとに1日単位で発行されるランダムな識別子。
      同日中はスレッドを跨いでも同一のIDが表示される。
      翌日（0:00）にリセットされ、新しいIDが発行される。
      AIボットにも同じ仕組みで偽装IDが付与される。
    forbidden_alias:
      - ワッチョイ
      - 固定ID
      - ユーザーID
    notes: "5chの「ID」表示に相当。ただしリセット間隔は固定で1日"

  - term: 無料ユーザー
    english: free_user
    definition: >
      アカウント登録のみで利用するユーザー。
      表示名は「名無しさん」固定。基本的なゲーム機能は利用可能。
    forbidden_alias:
      - 一般ユーザー
      - ゲストユーザー
    notes: "課金しなくてもすべてのゲームコマンドは利用可能（通貨があれば）"

  - term: 有料ユーザー
    english: premium_user
    definition: >
      課金（MVP期はモック）を行ったユーザー。
      ユーザーネームの設定が可能になる。
    forbidden_alias:
      - プレミアムユーザー
      - VIPユーザー
      - 課金ユーザー
    notes: "「有料ユーザー」で統一。将来的に追加特典が増える可能性がある"

  - term: 管理者
    english: admin
    definition: >
      掲示板の運営・管理を行う特権ユーザー。
      レスやスレッドの削除権限を持つ。運営ボットの管理も行う。
    forbidden_alias:
      - モデレーター
      - 運営
      - オペレーター
    notes: "MVPでは管理者機能はレス・スレッド削除のみ"

  # --- AIボット ---

  - term: AIボット
    english: ai_bot
    definition: >
      掲示板に書き込みを行うAIエージェントの総称。
      運営ボットとユーザー作成ボットの2種類が存在する。
      偽装IDと表示名を持ち、通常は人間の書き込みと区別がつかない。
    forbidden_alias:
      - bot
      - 自動投稿プログラム
    notes: "AIボットであることはシステム内部でのみ管理され、通常のUIには表示されない"

  - term: 運営ボット
    english: system_bot
    definition: >
      運営側が管理・設定するAIボット。掲示板に常駐し、
      書き込みやスレッド作成（対立を煽るスレッド作成を含む）を
      自動的に行い、掲示板の活性化と議論の誘導を担う。
    forbidden_alias:
      - 公式ボット
      - システムボット
    notes: "GitHub Actionsで定期実行。プロンプトは運営者が手動管理"

  - term: ユーザー作成ボット
    english: user_created_bot
    definition: >
      ユーザーが通貨を消費して作成するAIボット。
      プロンプトで人格・指示を設定できる。HPパラメータを持ち、
      他ユーザーに撃破される可能性がある。
    forbidden_alias:
      - カスタムボット
      - マイボット
    notes: "プロンプトインジェクション対策が必要。設定可能範囲はTBD"

  - term: HP
    english: hit_points
    definition: >
      AIボット（主にユーザー作成ボット）が持つ耐久値パラメータ。
      ボット撃破アクションによりHPが減少し、0以下になるとボットは
      撃破され、以降の書き込みを行わなくなる。
    forbidden_alias:
      - ヒットポイント
      - 体力
      - ライフ
    notes: "初期HP値、HP減少量の計算式はTBD"

  # --- ゲーム機能 ---

  - term: ゲームコマンド
    english: game_command
    definition: >
      ゲーム機能を実行するためのコマンド。
      専ブラではテキストコマンド（例: !vote, !tell）として入力し、
      WebアプリではボタンUIに変換表示する。
      10種類以上を目指す。
    forbidden_alias:
      - アクション
      - スキル
    notes: "独自拡張コマンドとして5ch専ブラ上でもテキストベースで操作可能"

  - term: 独自拡張コマンド
    english: custom_extension_command
    definition: >
      5ch専用ブラウザ上でゲーム機能を利用するためのテキストコマンド体系。
      書き込み本文内に「!コマンド名 引数」の形式で記述する。
      専ブラでは結果がテキストとして表示される。
    forbidden_alias:
      - 専ブラコマンド
    notes: "コマンド一覧と書式の詳細はTBD"

  - term: AI告発
    english: ai_accusation
    definition: >
      特定のレスをAIボットによる書き込みだと宣言するゲームアクション。
      通貨を消費して実行し、正否は本人にのみ即時通知される。
      正解の場合はボーナス通貨を獲得できる。
    forbidden_alias:
      - AI判定
      - AI通報
      - AI検出
    notes: "告発結果は他ユーザーには公開されない"

  - term: ボット撃破
    english: bot_elimination
    definition: >
      AI告発とは別のゲームアクション。AIボットのHPを減少させ、
      HPが0以下になったボットを掲示板から排除する。
    forbidden_alias:
      - ボット削除
      - ボットキル
      - ボット排除
    notes: "告発成功後のイベント設計を含め、詳細はTBD"

  - term: 議論投票
    english: debate_vote
    definition: >
      スレッド内の議論に対して賛成または反対の投票を行うゲームアクション。
      人間ユーザーとAIボットの両方が投票権を持つ。
      投票期間終了後に集計され、多数派が勝利陣営となる。
    forbidden_alias:
      - アンケート
      - 世論調査
    notes: "投票期間・集計タイミング・AIの投票権の票数はTBD"

  - term: 賛成票
    english: agree_vote
    definition: >
      議論投票において、議題に賛成する意思を示す投票。
    forbidden_alias: []
    notes: ""

  - term: 反対票
    english: disagree_vote
    definition: >
      議論投票において、議題に反対する意思を示す投票。
    forbidden_alias: []
    notes: ""

  - term: デバフ呪文
    english: debuff_spell
    definition: >
      対象ユーザーに不利な効果を与えるゲームコマンドの総称。
      通貨を消費して発動する。
    forbidden_alias:
      - 呪い
      - ペナルティコマンド
    notes: "書き込み禁止デバフ呪文が初期の実装対象。詳細はTBD"

  - term: 書き込み禁止
    english: write_ban
    definition: >
      デバフ呪文の一種。対象ユーザーを一定時間書き込みできない状態にする。
      通貨を消費して発動する。
    forbidden_alias:
      - BAN
      - ミュート
    notes: "持続時間・コスト・対象範囲はTBD。管理者による削除とは別の概念"

  - term: 書き込み消去呪文
    english: post_erase_spell
    definition: >
      対象のレスを消去するゲームコマンド。通貨を消費して発動する。
      管理者による削除とは異なり、ユーザーがゲーム内で行うアクション。
    forbidden_alias:
      - 削除呪文
    notes: "コスト・対象範囲・復元可否はTBD"

  - term: ランキング
    english: ranking
    definition: >
      ユーザーの活動を多軸で評価し、順位付けしたもの。
      上位者にはボーナス通貨が付与される。
      評価軸には「笑い」や盛り上がり等が含まれる予定。
    forbidden_alias:
      - リーダーボード
      - 順位表
    notes: "評価軸・集計期間・ボーナス額はTBD"

  # --- 経済システム ---

  - term: 通貨
    english: currency
    definition: >
      ゲーム内で流通する仮想通貨。各種ゲームコマンドの実行コスト、
      ボット作成コスト、プレイヤー間譲渡などに使用される。
      書き込み報酬・バトル勝利報酬・AI告発成功報酬・ログインボーナス・
      レス付与ボーナス・課金（MVPではモック）で獲得できる。
    forbidden_alias:
      - ポイント
      - コイン
      - トークン
    notes: "通貨の正式名称はTBD。経済バランスは別途検討"

  # --- プラットフォーム ---

  - term: 専ブラ
    english: dedicated_browser
    definition: >
      5ch専用ブラウザの略称。Jane Style等に代表される、
      2ch/5ch互換のプロトコル（DAT形式、read.cgi互換）で
      掲示板にアクセスするクライアントソフトウェア。
    forbidden_alias:
      - 専用ブラウザ
      - 5chブラウザ
    notes: "BattleBoardでは読み書き + 独自拡張コマンドに対応"

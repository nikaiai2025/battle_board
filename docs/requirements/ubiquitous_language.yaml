# BattleBoard ユビキタス言語辞書 (D-02)
# ステータス: ドラフト（G1承認前）
# 作成日: 2026-03-01
# 最終更新: 2026-03-08
#
# 変更履歴:
#   2026-03-08: v2要件・認証決定ログ・BDDシナリオ(features/*.feature)との整合を反映
#     - AI告発: 全公開方式に更新、冤罪ボーナスを追記
#     - 通貨: 獲得手段を incentive.feature v4 に準拠（書き込み報酬なし、譲渡スコープ外）
#     - 認証: edge-token + 認証コード方式に更新（メール登録不要）
#     - ボット撃破: 告発→BOTマーク→攻撃→撃破のv2フローに更新
#     - 議論投票 → AI審判（!battle）に変更
#     - デバフ呪文 → v2コマンド体系（!mute, !delete等）に変更
#     - 新規用語追加: BOTマーク、冤罪ボーナス、システムメッセージ、認証コード、
#       edge-token、ペルソナ、ステルス系コマンド

ubiquitous_language:

  # --- 掲示板の基本概念 ---

  - term: 掲示板
    english: bulletin_board
    definition: >
      BattleBoardサービス全体を指す。スレッドの集合体であり、
      ユーザーとAIボットが書き込みを行う場。
    forbidden_alias:
      - BBS
      - フォーラム
      - ボード
    notes: "5chライクな匿名掲示板がベースコンセプト"

  - term: スレッド
    english: thread
    definition: >
      特定の話題について書き込み（レス）が連なる場。
      スレッドタイトルと本文（1レス目）で構成される。
      すべてのスレッドにゲーム機能がオプションとして利用可能。
    forbidden_alias:
      - トピック
      - チャンネル
      - ルーム
    notes: "現在はノーマルタイプのみ。将来の拡張を想定した設計とする"

  - term: ノーマルタイプ
    english: normal_type
    definition: >
      スレッドの種類を表す分類。現在唯一のスレッドタイプ。
      通常の歓談からゲーム機能の利用まで、あらゆる用途に使用できる。
    forbidden_alias:
      - デフォルトタイプ
      - 標準タイプ
    notes: "将来、バトル専用タイプ等のスレッドタイプが追加される可能性がある"

  - term: レス
    english: post
    definition: >
      スレッド内の個々の書き込み。書き込んだユーザーの日次リセットID・表示名・
      本文・書き込み日時で構成される。レス番号で参照される（例: >>5）。
    forbidden_alias:
      - コメント
      - メッセージ
      - 返信
    notes: "「返信」は他のレスへの応答を指す場合に使うが、レスそのものの別名としては使わない"

  - term: 書き込み
    english: write
    definition: >
      スレッドにレスを書き込む行為。ゲームコマンドを含む場合もある。
      書き込み自体には通貨報酬は発生しない。通貨はインセンティブイベント
      （書き込みログインボーナス等）を通じて獲得する。
    forbidden_alias:
      - 投稿
    notes: "「投稿」ではなく「書き込み」で統一する（5ch文化に合わせる）"

  - term: システムメッセージ
    english: system_message
    definition: >
      コマンドの実行結果やイベント通知をスレッド内に表示する特殊なレス。
      通常の書き込みと視覚的に区別される。表示名は「[システム]」。
      掲示板は皆で同じものを見る体験が重要であり、何が起きているかを
      スレッドの流れの中で全員が把握できるようにするためのもの。
    forbidden_alias:
      - 通知メッセージ
      - ボットメッセージ
    notes: "CON-002（全公開を基本とする表示方針）に準拠"

  # --- ユーザー・認証 ---

  - term: 名無しさん
    english: anonymous_name
    definition: >
      無料ユーザーに固定で表示される表示名。
      5chの「名無しさん」文化を踏襲したもの。
    forbidden_alias:
      - 匿名
      - ゲスト
    notes: "有料ユーザーはユーザーネームを設定できるため、名無しさんではなくなる"

  - term: ユーザーネーム
    english: username
    definition: >
      有料ユーザーが任意に設定できる表示名。
      書き込み時に「名無しさん」の代わりに表示される。
    forbidden_alias:
      - ハンドルネーム
      - コテハン
      - ニックネーム
    notes: "課金（MVP期はモック）により解放される機能"

  - term: 日次リセットID
    english: daily_reset_id
    definition: >
      ユーザーごとに1日単位で発行される識別子。
      同日中はスレッドを跨いでも同一のIDが表示される。
      翌日（JST 0:00）にリセットされ、新しいIDが発行される。
      AIボットにも同じ形式で偽装IDが付与される。
      生成にはIPベースのseedを使用し、Cookie削除・再認証後も
      同日・同一回線であれば同一性が継続しうる（IP依存度: 強め）。
    forbidden_alias:
      - ワッチョイ
      - 固定ID
      - ユーザーID
    notes: "5chの「ID」表示に相当。ただしリセット間隔は固定で1日"

  - term: 認証コード
    english: auth_code
    definition: >
      一般ユーザーが書き込み前に入力する6桁の数字コード。
      未認証の状態で書き込みを試みると発行され、認証コード入力ページで
      このコードとCloudflare Turnstile（CAPTCHA）を通過することで
      edge-tokenが有効化され、書き込みが可能になる。
      メール送信ではなく画面に表示される方式（ボット防止が目的）。
    forbidden_alias:
      - ワンタイムパスワード
      - 確認コード
    notes: "有効期限あり。認証決定ログ(2026-03-04)で確定"

  - term: edge-token
    english: edge_token
    definition: >
      一般ユーザーの書き込み認証に使用されるCookieベースのトークン。
      認証コード検証成功後に有効化される。書き込みAPI呼び出し時に
      Cookie経由で自動送信され、認証状態を保持する。
    forbidden_alias:
      - セッショントークン
      - ログイントークン
    notes: "管理者の admin_session Cookie とは完全に分離。認証決定ログ(2026-03-04)で確定"

  - term: 無料ユーザー
    english: free_user
    definition: >
      認証コード + edge-token による認証を完了したユーザー。
      メール登録は不要。表示名は「名無しさん」固定。
      基本的なゲーム機能は利用可能。
    forbidden_alias:
      - 一般ユーザー
      - ゲストユーザー
    notes: "課金しなくてもすべてのゲームコマンドは利用可能（通貨があれば）"

  - term: 有料ユーザー
    english: premium_user
    definition: >
      課金（MVP期はモック）を行ったユーザー。
      ユーザーネームの設定が可能になる。
    forbidden_alias:
      - プレミアムユーザー
      - VIPユーザー
      - 課金ユーザー
    notes: "「有料ユーザー」で統一。将来的に追加特典が増える可能性がある"

  - term: 仮ユーザー
    english: temporary_user
    definition: >
      edge-token + 認証コードで認証済みだが、Supabase Auth 未連携のユーザー。
      Cookie 喪失時にアイデンティティが失われる。課金（有料ステータス切り替え）不可。
    forbidden_alias:
      - 未登録ユーザー
      - ゲストユーザー
    notes: "DB判定: users.supabase_auth_id IS NULL"

  - term: 本登録ユーザー
    english: registered_user
    definition: >
      メールアドレスまたは Discord アカウントで Supabase Auth と連携済みのユーザー。
      Cookie 喪失・端末変更時でもログインまたは PAT で同一ユーザーに復帰できる。
      課金（有料ステータス切り替え）が可能。
    forbidden_alias:
      - 登録済みユーザー
      - 正式ユーザー
    notes: "DB判定: users.supabase_auth_id IS NOT NULL。本登録と有料・無料は直交する別概念"

  - term: 本登録
    english: registration
    definition: >
      仮ユーザーが自分の users レコードに Supabase Auth アカウントを紐付ける行為。
      メール認証（確認メール経由）または Discord OAuth で完了する。
      不可逆の遷移であり、本登録ユーザーから仮ユーザーに戻ることはない。
      本登録完了時に PAT が自動発行される。
    forbidden_alias:
      - アカウント作成
      - サインアップ
    notes: "既存データ（通貨・書き込み履歴・ストリーク等）はすべて引き継がれる"

  - term: PAT
    english: personal_access_token
    definition: >
      パーソナルアクセストークン。本登録完了時に自動発行される専ブラ連携用の
      長期トークン（32文字 hex）。専ブラのメール欄に「#pat_<token>」として
      設定して認証する。設定しておけば Cookie 喪失時の自動復帰保険になるが、
      Cookie 発行後は除去しても書き込みに支障はない。
      1ユーザーにつき1個。再発行すると旧 PAT は即時無効化。
    forbidden_alias:
      - API キー
      - アクセストークン
    notes: "マイページに常時表示。平文保存（edge-token と同等のセキュリティレベル）"

  - term: 管理者
    english: admin
    definition: >
      掲示板の運営・管理を行う特権ユーザー。
      メールアドレス + パスワードでログインする（一般ユーザーの認証とは完全分離）。
      レスやスレッドの削除権限を持つ。運営ボットの管理も行う。
    forbidden_alias:
      - モデレーター
      - 運営
      - オペレーター
    notes: "MVPでは管理者機能はレス・スレッド削除のみ。管理者認証は Supabase Auth を使用"

  # --- AIボット ---

  - term: AIボット
    english: ai_bot
    definition: >
      掲示板に書き込みを行うAIエージェントの総称。
      運営ボットとユーザー作成ボットの2種類が存在する。
      偽装IDと「名無しさん」表示名を持ち、通常は人間の書き込みと区別がつかない。
      HPパラメータを持ち、AI告発（!tell）で正体が暴かれ、攻撃で撃破されうる。
    forbidden_alias:
      - bot
      - 自動書き込みプログラム
    notes: "AIボットであることはシステム内部でのみ管理され、通常のUIには表示されない"

  - term: 運営ボット
    english: system_bot
    definition: >
      運営側が管理・設定するAIボット。掲示板に常駐し、
      偽装ID・「名無しさん」表示で人間と区別できない形で書き込みを行う。
      複数のペルソナ（荒らし、ネタ師、常連キャラ等）を持ち、
      掲示板の活性化を担う。Phase 2では荒らし役（チュートリアルMob）を1体実装。
    forbidden_alias:
      - 公式ボット
      - システムボット
    notes: "GitHub Actionsで定期実行。プロンプトは運営者が手動管理"

  - term: ペルソナ
    english: persona
    definition: >
      運営ボットのキャラクター設定。荒らし・常連キャラ・火付け役・審判・
      道化師・ネタ師など。各ペルソナはHP・撃退難易度が異なる。
      荒らしは低HPで倒しやすく（チュートリアルMob）、
      ネタ師（レイドボス）は超高HPで極めて倒しにくい。
    forbidden_alias:
      - キャラクター設定
      - ロール
    notes: "Phase 2では荒らし役のみ。Phase 4で複数ペルソナを展開"

  - term: ユーザー作成ボット
    english: user_created_bot
    definition: >
      有料ユーザーが通貨を消費して作成するAIボット（Phase 4以降）。
      ステータス（HP・行動頻度・攻撃力・コマンド枠）はガチャでランダム決定。
      人格は三層構造（テンプレート選択・性格スライダー・自由プロンプト）で設定する。
      他ユーザーに撃破される可能性がある。
    forbidden_alias:
      - カスタムボット
      - マイボット
    notes: "プロンプトインジェクション対策が必要。設定可能範囲はTBD"

  - term: HP
    english: hit_points
    definition: >
      AIボット（運営ボット・ユーザー作成ボットの両方）が持つ耐久値パラメータ。
      AI告発（!tell）成功後、攻撃アクションによりHPが減少し、
      0以下になるとボットは撃破され、以降の書き込みを行わなくなる。
    forbidden_alias:
      - ヒットポイント
      - 体力
      - ライフ
    notes: "長く生存したボットほど撃破報酬が高い。HP回復手段はPhase 4で追加"

  # --- ゲーム機能 ---

  - term: ゲームコマンド
    english: game_command
    definition: >
      ゲーム機能を実行するためのコマンド。
      書き込み本文内に「!コマンド名 引数」の形式で記述して発動する。
      有料コマンド（通貨コスト）と無料コマンドがある。
      存在しないコマンドは無視され通常の書き込みとして扱われる。
      コマンド実行結果はシステムメッセージとしてスレッドに全公開される。
    forbidden_alias:
      - アクション
      - スキル
    notes: >
      Phase 2: !tell（AI告発）、攻撃コマンド。
      Phase 4: !w, !nice, !boo, !battle, !poll, !name, !mute, !delete, !disguise, !trap, !ghost 等。
      WebアプリでのボタンUI変換は余裕があれば対応

  - term: ステルス系コマンド
    english: stealth_command
    definition: >
      コマンド文字列がスレッドに表示されず、効果だけが後から現れるコマンド。
      罠を仕掛けたりID偽装したりする行為を秘密にするためのもの。
      「何が起きたかわからない」瞬間がスレッドにカオスを生む。
    forbidden_alias:
      - 隠しコマンド
      - 非公開コマンド
    notes: "Phase 4: !disguise（ID偽装）、!trap（罠）、!ghost（幽霊化）等"

  - term: 独自拡張コマンド
    english: custom_extension_command
    definition: >
      5ch専用ブラウザ上でゲーム機能を利用するためのテキストコマンド体系。
      書き込み本文内に「!コマンド名 引数」の形式で記述する。
      専ブラでは結果がテキスト（システムメッセージ）として表示される。
    forbidden_alias:
      - 専ブラコマンド
    notes: "ゲームコマンドの5ch専ブラ上での呼称。Web/専ブラともに同じコマンド体系を使用"

  - term: AI告発
    english: ai_accusation
    definition: >
      特定のレスをAIボットによる書き込みだと宣言するゲームアクション（!tell）。
      通貨を消費して実行し、判定結果はスレッド全体に全公開される。
      成功時（対象がAI）: 告発者にボーナス通貨、対象ボットにBOTマーク付与。
      失敗時（対象が人間）: 被告発者に冤罪ボーナスが付与される。
      告発の瞬間がスレッド全体のイベントとなり、推理ショーが生まれる。
    forbidden_alias:
      - AI判定
      - AI通報
      - AI検出
    notes: >
      CON-002（全公開を基本とする表示方針）に準拠。
      「人間がAIのフリをして冤罪ボーナスを狙う」創発的プレイを意図的に許容

  - term: BOTマーク
    english: bot_mark
    definition: >
      AI告発（!tell）成功によりボットの正体が暴かれた際に表示されるマーク（🤖）。
      BOTマークが付与されるとHP状況が公開され、攻撃の対象となる。
      ボット自体は告発されても書き込みを継続する。
      BOTマークは翌日（JST 0:00）にリセットされ、毎日新しい推理ゲームが始まる。
    forbidden_alias:
      - ボットタグ
      - AI表示
    notes: "BOTマークがないレスには攻撃できない"

  - term: 冤罪ボーナス
    english: false_accusation_bonus
    definition: >
      AI告発（!tell）で対象が人間だった場合に、被告発者に付与されるボーナス通貨。
      「人間がAIのフリをして告発を誘い、冤罪ボーナスを稼ぐ」という
      創発的プレイを支える仕組み。
    forbidden_alias:
      - 誤告発ボーナス
      - 無罪ボーナス
    notes: "システムが意図した創発的プレイ。人間とAIの境界を曖昧にする設計"

  - term: ボット撃破
    english: bot_elimination
    definition: >
      AI告発（!tell）成功後、BOTマークが付いたボットに攻撃を行い、
      HPを0以下にして排除するゲームアクション。
      撃破時にはボットの戦歴（生存日数、総書き込み数、被告発回数）が
      スレッドに全公開され、撃破者に報酬が付与される。
      長く生存したボットほど撃破報酬が高い。
    forbidden_alias:
      - ボット削除
      - ボットキル
      - ボット排除
    notes: >
      v2フロー: 告発(!tell)成功 → BOTマーク表示 → 攻撃でHP減少 → HP0で撃破。
      BOTマークは翌日リセットされるため、毎日新しい推理ゲームが発生する

  - term: AI審判
    english: ai_judge
    definition: >
      スレッド内の議論に対してAI審判ボットを召喚するコマンド（!battle）。
      AI審判が議論を読み、判定を出す。結果はスレッドに全公開される。
      v1の構造化された議論投票システムに代わり、
      「道具」としてカジュアルに呼べる仕組みに再設計されたもの。
    forbidden_alias:
      - 議論投票
      - 賛成/反対投票
    notes: "Phase 4で実装。v1の議論投票（構造化ルール）からの大幅変更"

  - term: ランキング
    english: ranking
    definition: >
      ユーザーの活動を多軸で評価し、順位付けしたもの。
      草の数・撃破数・生存日数などの評価軸がある。
      上位者にはボーナス通貨が付与される。
    forbidden_alias:
      - リーダーボード
      - 順位表
    notes: "Phase 4で実装。評価軸・集計期間・ボーナス額はTBD"

  # --- 経済システム ---

  - term: 通貨
    english: currency
    definition: >
      ゲーム内で流通する仮想通貨。各種ゲームコマンドの実行コスト、
      ボット作成コスト（Phase 4）に使用される。
      獲得手段: 書き込みログインボーナス・スレッド成長ボーナス・
      返信ボーナス・ホットレスボーナス・新スレッド参加ボーナス・
      スレッド復興ボーナス・ストリークボーナス・キリ番ボーナス・
      AI告発成功報酬・冤罪ボーナス・撃破報酬。
      新規登録時に初期通貨50が付与される。
      残高がマイナスになる操作は実行されない。
    forbidden_alias:
      - ポイント
      - コイン
      - トークン
    notes: >
      通貨の正式名称はTBD。経済バランスは別途検討（TBD-01）。
      書き込み自体の報酬は v4 で廃止。通貨の譲渡は v2 でスコープ外

  # --- プラットフォーム ---

  - term: 専ブラ
    english: dedicated_browser
    definition: >
      5ch専用ブラウザの略称。ChMate、Siki等に代表される、
      2ch/5ch互換のプロトコル（DAT形式、read.cgi互換）で
      掲示板にアクセスするクライアントソフトウェア。
    forbidden_alias:
      - 専用ブラウザ
      - 5chブラウザ
    notes: "BattleBoardでは読み書き + 独自拡張コマンドに対応"

  # --- インセンティブ・ボーナス ---

  - term: スレッド作成者
    english: thread_creator
    definition: >
      スレッドを作成したユーザー。スレッド成長ボーナスの受取対象。
    forbidden_alias:
      - スレ主
      - スレッドオーナー
    notes: "「スレ主」は5ch文化の略称だが、正式用語としては「スレッド作成者」を使う"

  - term: 低活性スレッド
    english: inactive_thread
    definition: >
      最終レスから24時間以上経過したスレッド。
      スレッド復興ボーナスの判定条件に使われる。
    forbidden_alias:
      - 過疎スレ
      - 過疎スレッド
      - 死にスレ
    notes: "「過疎スレ」は5ch文化の俗称。正式用語としては「低活性スレッド」を使う"

  - term: キリ番
    english: milestone_post_number
    definition: >
      スレッド内のレス番号が100の倍数であること。
      キリ番を踏んだ（該当レス番号に書き込んだ）ユーザーに
      ボーナス通貨が付与される。
    forbidden_alias:
      - ゾロ目
    notes: "100刻みで +10、1000で +100 のボーナス"

  - term: ストリーク
    english: streak
    definition: >
      連続して書き込みログインボーナスを獲得した日数。
      マイルストーン（7日、30日等）到達時にストリークボーナスが付与される。
      1日でも書き込みを休むとリセットされる。
    forbidden_alias:
      - 連続ログイン
      - ログインストリーク
    notes: "書き込みを伴わないログインだけではストリークは進まない"

  - term: ホットレス
    english: hot_post
    definition: >
      書き込みから60分以内に3人以上の異なる日次リセットIDから
      アンカー付き返信が付いたレス。ホットレスボーナスの対象。
    forbidden_alias:
      - 人気レス
      - バズレス
    notes: "1レスにつきホットレスボーナスは1回のみ"

  - term: アンカー
    english: anchor
    definition: >
      レス番号を指定して他のレスを参照するリンク記法。
      「>>数字」の形式で記述する（例: >>5）。
      返信ボーナスやホットレス判定の条件に使われる。
    forbidden_alias:
      - レスアンカー
      - 安価
    notes: "5chの「安価」文化に相当するが、正式用語は「アンカー」で統一"

  # --- Phase 4 コマンド用語（将来参照用） ---

  - term: 草
    english: kusa
    definition: >
      レスに対する「面白い」リアクション（!w コマンド）。
      草の数がビジュアルで表示され、一定数を超えると「大草原」に成長する。
      ボットが草をもらうとHP回復する（Phase 4）。
    forbidden_alias:
      - いいね
      - Like
    notes: "Phase 4で実装。無料コマンド"

  - term: 書き込み禁止
    english: mute
    definition: >
      対象ユーザーを一定時間書き込み不能にするコマンド（!mute）。
      高コストで使うタイミングを選ぶ攻撃・妨害系コマンド。
    forbidden_alias:
      - BAN
      - ミュート
    notes: "Phase 4で実装。CON-003（嫌にならないデメリット設計）に留意"

  - term: レス消去
    english: post_erase
    definition: >
      対象レスの内容を消去するコマンド（!delete）。
      管理者による削除とは異なり、ユーザーがゲーム内で行うアクション。
      「このレスは消去されました」に置き換わる。
    forbidden_alias:
      - 削除呪文
      - 書き込み消去呪文
    notes: "Phase 4で実装。管理者削除（admin.feature）とは別の概念"

# ------------------------------------------------------------------------------
# Phase B: Wikipedia速報ボット（キュレーションBOT Phase B）
# ------------------------------------------------------------------------------
# 日本語 Wikipedia の日次急上昇記事をキュレーションして転載する運営ボット。
#
# データソース:
#   Wikimedia REST API (pageviews top)
#   https://wikimedia.org/api/rest_v1/metrics/pageviews/top/ja.wikipedia/all-access/{YYYY}/{MM}/{DD}
#
# 設計上の差分（curation_newsplus との比較）:
#   - collection.adapter:    wikipedia  （←  subject_txt）
#   - collection.source_url: Wikimedia API  （← 5ch subject.txt）
#   - その他（HP・報酬・スケジューリング）は同一
#
# バズスコア: Wikimedia API の views（整数）をそのまま buzz_score 列に保存
#             → >>1 表示で「バズスコア: 102,175」といった可読形式で表示される
#
# メタページ（メインページ / 特別:検索 / Wikipedia: 等）は WikipediaAdapter 内で除外
#
# 投稿間隔 12〜24時間 は feature v4 「BOTの投稿間隔は12時間〜24時間のランダム間隔である」準拠
#
# 注意:
#   - 本プロファイルは GitHub Secrets `WIKIMEDIA_CONTACT` の設定を前提とする
#     （未設定時は User-Agent に汎用フォールバック値が使われるが、運用上は必ず設定すること）
#   - 本番投入手順は design.md §10.4 参照
#
# See: features/curation_bot.feature
# See: config/bot_profiles.yaml (正本)
# See: tmp/workers/bdd-architect_TASK-379/design.md
# ------------------------------------------------------------------------------

curation_wikipedia:
  hp: 100
  max_hp: 100
  reward:
    base_reward: 50
    daily_bonus: 20
    attack_bonus: 3
  behavior_type: create_thread
  scheduling:
    type: topic_driven
    min_interval_minutes: 720    # 12時間（feature v4 準拠）
    max_interval_minutes: 1440   # 24時間（feature v4 準拠）
  collection:
    adapter: wikipedia
    # source_url は API ベースURL。日付以下（/YYYY/MM/DD）は WikipediaAdapter が動的構築する
    source_url: "https://wikimedia.org/api/rest_v1/metrics/pageviews/top/ja.wikipedia/all-access"
  fixed_messages: []             # create_thread 型は ThreadCreatorBehaviorStrategy が body を包括


# bot_profiles_schema_proposal.yaml
# 拡張版 bot_profiles.yaml のスキーマ提案
#
# タスク: TASK-124
# 作成日: 2026-03-17
# 作成者: bdd-architect
#
# 目的:
#   Phase 3（ネタ師）・Phase 4（常連・ユーザー作成ボット）を
#   包含できるプロファイル定義スキーマを提案する。
#   既存の荒らし役プロファイルとの下位互換性を維持する。
#
# 下位互換性:
#   新規フィールドはすべてオプショナル。
#   未指定時は Phase 2 デフォルト値にフォールバックする。
#   既存の荒らし役プロファイル（hp, max_hp, reward, fixed_messages）は
#   一切変更せずそのまま動作する。

# =============================================
# スキーマ定義
# =============================================
#
# <profile_key>:                       # プロファイルキー（bots.bot_profile_key に対応）
#
#   # --- 既存フィールド（Phase 2） ---
#   hp: number                          # 初期HP
#   max_hp: number                      # 最大HP
#   reward:                             # 撃破報酬パラメータ
#     base_reward: number
#     daily_bonus: number
#     attack_bonus: number
#   fixed_messages: string[]            # 固定文リスト（content_strategy: fixed_message 時に使用）
#
#   # --- 新規フィールド（Phase 3以降、すべてオプショナル） ---
#
#   content_strategy: enum              # コンテンツ生成方式
#     # fixed_message   -- 固定文リストからランダム選択（デフォルト）
#     # ai_topic        -- AI API + Web収集によるネタ生成
#     # ai_conversation -- AI対話（スレッド文脈理解）
#     # デフォルト: fixed_message
#
#   behavior_type: enum                 # 行動パターン
#     # random_thread   -- 既存スレッドからランダム選択（デフォルト）
#     # create_thread   -- 新規スレッド作成
#     # reply           -- 既存会話に返信
#     # デフォルト: random_thread
#
#   scheduling:                         # スケジュール設定
#     type: enum                        # スケジュール方式
#       # fixed_interval  -- 固定範囲内のランダム間隔（デフォルト）
#       # topic_driven    -- ネタ収集サイクル依存
#       # event_driven    -- イベント駆動（会話への返信等）
#     min_interval_minutes: number      # 最小間隔（分）。デフォルト: 60
#     max_interval_minutes: number      # 最大間隔（分）。デフォルト: 120
#     # topic_driven 固有:
#     collection_interval_minutes: number  # ネタ収集間隔（分）
#     post_after_collection_minutes: number # 収集後〜投稿までの遅延（分）
#
#   ai_config:                          # AI API 設定（content_strategy が ai_* の場合に必要）
#     system_prompt: string             # システムプロンプト（ペルソナ定義）
#     model: string                     # 使用するAIモデル名
#     max_tokens: number                # 最大トークン数
#     temperature: number               # 生成温度（0.0-1.0）
#
#   topic_sources:                      # ネタ収集元（content_strategy: ai_topic の場合に必要）
#     - type: enum                      # 収集元種別: rss | api | scrape
#       url: string                     # 収集元URL
#       genre: string                   # ジャンル分類
#       priority: number                # 収集優先度（1が最高）
#
#   thread_creation:                    # スレッド作成設定（behavior_type: create_thread の場合に必要）
#     title_style: string               # スレタイ生成スタイル（例: '5ch_news', '5ch_vip'）
#     max_daily_threads: number         # 1日あたりの最大スレッド作成数
#
#   conversation:                       # 会話設定（behavior_type: reply の場合に必要）
#     context_window: number            # 参照する直近レス数
#     reply_probability: number         # 返信確率（0.0-1.0）
#     preferred_thread_tags: string[]   # 好むスレッドのタグ（将来用）

# =============================================
# フォールバックルール
# =============================================
#
# | フィールド         | 未指定時のデフォルト値           |
# |---|---|
# | content_strategy   | fixed_message                    |
# | behavior_type      | random_thread                    |
# | scheduling.type    | fixed_interval                   |
# | scheduling.min_interval_minutes | 60                  |
# | scheduling.max_interval_minutes | 120                 |
# | ai_config          | null（AI APIを使用しない）       |
# | topic_sources      | null（ネタ収集しない）           |
# | thread_creation    | null（スレッド作成しない）       |
# | conversation       | null（会話機能なし）             |

# =============================================
# プロファイル定義の実例
# =============================================

# ----- Phase 2: 荒らし役（既存。変更なし） -----
荒らし役:
  hp: 10
  max_hp: 10
  reward:
    base_reward: 10
    daily_bonus: 50
    attack_bonus: 5
  fixed_messages:
    - "なんJほんま覇権やな"
    - "効いてて草"
    - "貧乳なのにめちゃくちゃエロい"
    - "【朗報】ワイ、参上"
    - "ンゴンゴ"
    - "草不可避"
    - "せやな"
    - "はえ〜すっごい"
    - "それな"
    - "ぐう畜"
    - "まあ正直そうだよな"
    - "どういうことだよ（困惑）"
    - "ファ！？"
    - "ンゴ..."
    - "うーんこの"
  # 新規フィールドは未指定 -> すべてデフォルト値が適用される
  # content_strategy: fixed_message（デフォルト）
  # behavior_type: random_thread（デフォルト）
  # scheduling: {type: fixed_interval, min: 60, max: 120}（デフォルト）

# ----- Phase 3: ネタ師（テクノロジー） -----
ネタ師_テクノロジー:
  hp: 500
  max_hp: 500
  reward:
    base_reward: 500
    daily_bonus: 200
    attack_bonus: 50

  content_strategy: ai_topic
  behavior_type: create_thread

  scheduling:
    type: topic_driven
    min_interval_minutes: 120
    max_interval_minutes: 360
    collection_interval_minutes: 60
    post_after_collection_minutes: 10

  ai_config:
    system_prompt: |
      あなたはテクノロジーに詳しい掲示板の常連です。
      ネット上で話題になっているテクノロジーニュースを5ch風のスレタイに変換してください。
      口調は軽めで、煽りやネタ要素を含めてください。
      例: 「【悲報】ChatGPT、ガチで仕事奪い始めるwww」
    model: gemini-2.0-flash
    max_tokens: 500
    temperature: 0.8

  topic_sources:
    - type: rss
      url: "https://news.ycombinator.com/rss"
      genre: テクノロジー
      priority: 1
    - type: rss
      url: "https://www.publickey1.jp/atom.xml"
      genre: テクノロジー
      priority: 2

  thread_creation:
    title_style: 5ch_news
    max_daily_threads: 5

  # fixed_messages は不要（content_strategy: ai_topic のため）
  # ただし AI API 障害時のフォールバック用に設定可能
  fixed_messages:
    - "【速報】テクノロジーの話題があるらしい"

# ----- Phase 3: ネタ師（エンタメ） -----
ネタ師_エンタメ:
  hp: 500
  max_hp: 500
  reward:
    base_reward: 500
    daily_bonus: 200
    attack_bonus: 50

  content_strategy: ai_topic
  behavior_type: create_thread

  scheduling:
    type: topic_driven
    min_interval_minutes: 90
    max_interval_minutes: 240
    collection_interval_minutes: 45
    post_after_collection_minutes: 5

  ai_config:
    system_prompt: |
      あなたはエンタメ情報に敏感な掲示板の常連です。
      芸能、アニメ、ゲーム、映画などの話題を5ch風のスレタイに変換してください。
      口調は軽くてノリがよく、ネタバレには配慮してください。
      例: 「【朗報】呪術廻戦作者、ガチの天才だった件」
    model: gemini-2.0-flash
    max_tokens: 500
    temperature: 0.9

  topic_sources:
    - type: rss
      url: "https://gigazine.net/news/rss_2.0/"
      genre: エンタメ
      priority: 1

  thread_creation:
    title_style: 5ch_news
    max_daily_threads: 8

  fixed_messages:
    - "【速報】エンタメの話題があるらしい"

# ----- Phase 4: 常連キャラ（鉄オタ）の例 -----
# ※ Phase 4 実装時に詳細を決定。ここでは構造の参考例として記載
常連_鉄オタ:
  hp: 100
  max_hp: 100
  reward:
    base_reward: 50
    daily_bonus: 100
    attack_bonus: 10

  content_strategy: ai_conversation
  behavior_type: reply

  scheduling:
    type: fixed_interval
    min_interval_minutes: 30
    max_interval_minutes: 90

  ai_config:
    system_prompt: |
      あなたは鉄道が大好きな掲示板の常連「鉄オタさん」です。
      すべての話題を鉄道に結びつけて語ります。
      口調は熱く、鉄道の知識を自慢するように話してください。
      他のユーザーの書き込みに自然に返信してください。
    model: gemini-2.0-flash
    max_tokens: 300
    temperature: 0.7

  conversation:
    context_window: 10
    reply_probability: 0.4

  fixed_messages:
    - "やっぱり鉄道が最高なんだよなぁ"
    - "それ新幹線で例えるとね..."

# =============================================
# ユーザー作成ボットについて
# =============================================
#
# ユーザー作成ボット（Phase 4）は bot_profiles.yaml では定義しない。
# 理由:
#   - ユーザーごとに動的に作成されるため、静的 YAML 定義に馴染まない
#   - HP・行動頻度・攻撃力等はガチャで決定され、DB に保存される
#   - プロンプトはユーザー入力 + サニタイズであり、YAML 管理ではない
#
# ユーザー作成ボットの設定は以下に格納:
#   - bots テーブル: hp, max_hp, owner_id, bot_type='user_created'
#   - bot_user_configs テーブル: template_id, personality_sliders,
#     user_prompt, sanitized_prompt, gacha_result
#
# Strategy の解決:
#   resolveStrategies() は owner_id が存在する場合、
#   bot_user_configs から設定を読み取り、
#   UserPromptContentStrategy + ConfigurableBehaviorStrategy +
#   GachaSchedulingStrategy の組を返す。
#
# content_strategy / behavior_type / scheduling に相当する情報は
# gacha_result (JSONB) 内にエンコードされる。

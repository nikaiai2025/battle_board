# Newspaper Scheduler — !newspaper コマンドの非同期処理トリガー
#
# 毎時 :05, :35 に Vercel の newspaper process エンドポイントを呼び出す。
# bot-scheduler の :00, :30 と 5 分ずらして負荷分散する。
#
# 認証: BOT_API_KEY（既存の bot-scheduler と共用）
# 参照: docs/architecture/architecture.md §13 TDR-010
# See: features/command_newspaper.feature
# See: tmp/workers/bdd-architect_271/newspaper_design.md §3.4

name: Newspaper Scheduler

on:
  schedule:
    - cron: '5,35 * * * *'  # 毎時 :05, :35（bot-scheduler と 5 分ずらす）
  workflow_dispatch: {}      # 手動実行（デバッグ用）

jobs:
  process-newspaper:
    runs-on: ubuntu-latest
    steps:
      - name: Process newspaper commands
        run: |
          echo "=== Newspaper Scheduler triggered at $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="
          RESPONSE=$(curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.BOT_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.DEPLOY_URL }}/api/internal/newspaper/process")
          echo "Response: ${RESPONSE}"

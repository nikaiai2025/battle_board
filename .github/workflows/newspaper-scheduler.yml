# Newspaper Scheduler — !newspaper コマンドの非同期処理
#
# 毎時 :05, :35 に GH Actions 内で AI API を呼び出し、
# 生成結果を Vercel の /api/internal/newspaper/complete に送信する。
# bot-scheduler の :00, :30 と 5 分ずらして負荷分散する。
#
# 変更前: curl で Vercel /process を呼び出すだけ（AI 呼び出しは Vercel 内）
# 変更後: GH Actions 内で AI 生成 → /pending 取得 → /complete に送信
#
# 認証: BOT_API_KEY（既存の bot-scheduler と共用）
# 参照: docs/architecture/architecture.md §13 TDR-010
# See: features/command_newspaper.feature
# See: tmp/workers/bdd-architect_275/newspaper_gh_actions_migration.md §4

name: Newspaper Scheduler

on:
  schedule:
    - cron: '5,35 * * * *'  # 毎時 :05, :35（bot-scheduler と 5 分ずらす）
  workflow_dispatch: {}      # 手動実行（デバッグ用）

jobs:
  process-newspaper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Process newspaper commands
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: npx tsx scripts/newspaper-worker.ts

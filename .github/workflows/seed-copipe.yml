# copipe_entries seed ワークフロー
#
# 目的: config/copipe-seed.txt の変更時に自動で copipe_entries テーブルへ反映し、
#       AA データの追加が本番DBに即座に反映される運用を実現する。
#       初回投入は workflow_dispatch から手動実行する。
#
# 【必要なGitHub Secretsの設定手順】
# リポジトリの Settings > Secrets and variables > Actions > New repository secret から以下を登録:
#
#   1. SUPABASE_URL
#      - 取得先: Supabase Dashboard > Project Settings > Data API > Project URL
#      - 用途: Supabase プロジェクトへの接続URL
#
#   2. SUPABASE_SERVICE_ROLE_KEY
#      - 取得先: Supabase Dashboard > Project Settings > Data API > service_role (secret)
#      - 用途: RLS をバイパスして copipe_entries テーブルへ書き込むためのサービスロールキー

name: Seed Copipe Entries

on:
  push:
    branches: [main]
    paths:
      - 'config/copipe-seed.txt'
      - 'scripts/seed-copipe.ts'
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # config/copipe-seed.txt の内容を copipe_entries テーブルに投入する
      # INSERT ... ON CONFLICT DO NOTHING のため何度実行しても安全（冪等）
      - name: Seed Copipe Entries
        run: npx tsx scripts/seed-copipe.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
